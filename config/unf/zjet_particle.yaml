# @package _global_
defaults:
  - /unf
  - override /net: lgatr
  - override /dataset: zjet_particle
  - _self_

data:
  on_gpu: false

model:
  _target_: src.models.AutoDiffUnfolder
  net:
    backbone:
      hidden_v_channels: 16
      hidden_s_channels: 64
      num_blocks: 4
      num_heads: 4
  
training:
  lr: 0.005
  batch_size: 256
  optimizer:
    warmup_steps: 5000
    weight_decay: 0.0
